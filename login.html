<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Tikura Flix</title>
    <link rel="stylesheet" href="auth.css">
</head>
<body>
    <main class="auth-page">
        <section class="auth-card" aria-label="Entrar na plataforma">
            <span class="auth-kicker">Area de membros</span>
            <h1><img src="imagens/tikuraflix.png" alt="Tikura Flix" style="max-width:200px;height:auto;"></h1>
            <p>Entre com seus dados para acessar suas imersoes, materiais e vivencias.</p>

            <form class="auth-form" action="#" method="post" data-auth-form="login">
                <label>
                    E-mail
                    <input type="email" name="email" placeholder="seuemail@exemplo.com" required>
                </label>

                <label>
                    Senha
                    <div class="auth-password-wrap">
                        <input type="password" name="senha" id="senha-login" placeholder="Digite sua senha" required>
                        <button type="button" class="auth-toggle-senha" aria-label="Ver senha" onclick="(function(btn){var i=document.getElementById('senha-login');if(i.type==='password'){i.type='text';btn.textContent='🙈';}else{i.type='password';btn.textContent='👁';}})(this)">👁</button>
                    </div>
                </label>

                <div class="auth-row">
                    <label class="auth-check">
                        <input type="checkbox" name="lembrar">
                        Lembrar acesso
                    </label>
                    <button type="button" class="auth-link auth-link-button" data-auth-reset>Esqueci minha senha</button>
                </div>

                <p class="auth-status" data-auth-status hidden></p>

                <button type="submit" class="auth-submit">Entrar</button>
            </form>

        </section>
    </main>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-config.js"></script>
    <script src="auth.js"></script>
</body>
</html>
